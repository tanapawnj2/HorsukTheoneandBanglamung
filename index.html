<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HorsukTheoneandBanglamung</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Dark theme (default) ── */
    :root {
      --bg: #0d0d0f;
      --surface: #161618;
      --surface2: #1e1e21;
      --border: rgba(255,255,255,0.07);
      --text: #f5f0f3;
      --muted: #7a6e76;
      --accent: #e8688a;
      --accent2: #c4506e;
      --accent-dim: rgba(232,104,138,0.12);
      --accent-glow: rgba(232,104,138,0.25);
      --danger: #f87171;
      --success: #86efac;
      --radius: 16px;
    }
    :root.light {
      --bg: #fdf5f8;
      --surface: #ffffff;
      --surface2: #fce8ef;
      --border: rgba(200,80,110,0.12);
      --text: #1a0d12;
      --muted: #9e7585;
      --accent: #d64d72;
      --accent2: #b83460;
      --accent-dim: rgba(214,77,114,0.1);
      --accent-glow: rgba(214,77,114,0.2);
      --danger: #e05555;
      --success: #3a9e6e;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      overflow: hidden;
      transition: background 0.35s, color 0.35s;
      position: relative;
    }

    /* Background glow blobs */
    body::before {
      content: '';
      position: fixed;
      top: -20%; right: -10%;
      width: 55vw; height: 55vw;
      background: radial-gradient(circle, rgba(232,104,138,0.07) 0%, transparent 65%);
      pointer-events: none;
      border-radius: 50%;
    }
    body::after {
      content: '';
      position: fixed;
      bottom: -20%; left: -10%;
      width: 45vw; height: 45vw;
      background: radial-gradient(circle, rgba(232,104,138,0.05) 0%, transparent 65%);
      pointer-events: none;
      border-radius: 50%;
    }

    /* ── Theme Toggle ── */
    .theme-toggle {
      position: fixed; top: 1.25rem; left: 1.25rem; z-index: 100;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 99px; padding: 0.45rem 1rem;
      font-family: 'DM Sans', sans-serif; font-size: 0.78rem;
      color: var(--muted); cursor: pointer;
      display: flex; align-items: center; gap: 7px;
      transition: all 0.2s; box-shadow: 0 2px 12px rgba(0,0,0,0.2);
    }
    .theme-toggle:hover { border-color: var(--accent); color: var(--accent); }

    /* ── Auth Card ── */
    .auth-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2.75rem 2.5rem;
      width: 100%; max-width: 420px;
      position: relative; z-index: 1;
      box-shadow: 0 8px 40px rgba(0,0,0,0.3), 0 0 0 1px rgba(232,104,138,0.06);
      animation: fadeUp 0.5s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Brand */
    .brand {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.65rem; font-weight: 600;
      color: var(--accent);
      margin-bottom: 0.2rem;
      letter-spacing: -0.01em;
    }
    .brand-sub {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.9rem; font-weight: 400; font-style: italic;
      color: var(--muted); margin-bottom: 2rem;
    }

    /* Tabs */
    .tabs {
      display: grid; grid-template-columns: 1fr 1fr;
      background: var(--surface2); border-radius: 10px;
      padding: 4px; margin-bottom: 1.75rem; gap: 4px;
    }
    .tab-btn {
      background: none; border: none; color: var(--muted);
      font-family: 'DM Sans', sans-serif; font-size: 0.875rem;
      font-weight: 500; padding: 0.55rem 1rem; border-radius: 7px;
      cursor: pointer; transition: background 0.2s, color 0.2s;
    }
    .tab-btn.active {
      background: var(--surface); color: var(--text);
      box-shadow: 0 1px 6px rgba(0,0,0,0.3);
    }

    /* Form */
    .form-group { margin-bottom: 1rem; }
    label {
      display: block; font-size: 0.78rem; font-weight: 500;
      color: var(--muted); margin-bottom: 0.4rem;
      letter-spacing: 0.05em; text-transform: uppercase;
    }
    input {
      width: 100%; background: var(--surface2);
      border: 1px solid var(--border); border-radius: 10px;
      padding: 0.72rem 0.95rem; font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem; color: var(--text); outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input:focus {
      border-color: rgba(232,104,138,0.45);
      box-shadow: 0 0 0 3px var(--accent-dim);
    }
    input::placeholder { color: #3f3a3d; }
    :root.light input::placeholder { color: #c4aab4; }

    /* Buttons */
    .btn-primary {
      width: 100%; background: var(--accent); color: #fff;
      border: none; border-radius: 10px;
      padding: 0.78rem; font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem; font-weight: 500; cursor: pointer;
      margin-top: 0.5rem;
      transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 4px 18px var(--accent-glow);
    }
    .btn-primary:hover { opacity: 0.88; box-shadow: 0 6px 24px var(--accent-glow); }
    .btn-primary:active { transform: scale(0.98); }
    .btn-primary:disabled { opacity: 0.45; cursor: not-allowed; box-shadow: none; }

    /* Messages */
    .msg {
      font-size: 0.82rem; padding: 0.65rem 0.9rem;
      border-radius: 9px; margin-bottom: 1rem; display: none;
    }
    .msg.error   { background: rgba(248,113,113,0.1); color: var(--danger); border: 1px solid rgba(248,113,113,0.2); }
    .msg.success { background: rgba(134,239,172,0.1); color: var(--success); border: 1px solid rgba(134,239,172,0.2); }
    .msg.show    { display: block; }

    /* Spinner */
    .spinner {
      width: 15px; height: 15px;
      border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff;
      border-radius: 50%; animation: spin 0.6s linear infinite;
      display: inline-block; vertical-align: middle; margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Forgot link */
    .forgot-link {
      display: block; text-align: right; font-size: 0.78rem;
      color: var(--muted); cursor: pointer; margin-top: 0.3rem;
      text-decoration: none; transition: color 0.2s;
    }
    .forgot-link:hover { color: var(--accent); }

    /* Divider */
    .divider {
      display: flex; align-items: center; gap: 10px;
      margin: 1.25rem 0; color: var(--muted); font-size: 0.75rem;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }

    /* Forgot password views */
    .btn-back {
      display: flex; align-items: center; gap: 5px;
      background: none; border: none; color: var(--muted);
      font-family: 'DM Sans', sans-serif; font-size: 0.82rem;
      cursor: pointer; padding: 0; margin-bottom: 1.5rem;
      transition: color 0.2s;
    }
    .btn-back:hover { color: var(--accent); }
    .forgot-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.3rem; color: var(--text); margin-bottom: 0.4rem;
    }
    .forgot-desc { font-size: 0.83rem; color: var(--muted); line-height: 1.6; margin-bottom: 1.5rem; }

    /* Success state */
    .success-icon {
      width: 50px; height: 50px; border-radius: 50%;
      background: rgba(134,239,172,0.08); border: 2px solid rgba(134,239,172,0.25);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.3rem; margin-bottom: 1rem;
    }
    .success-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.25rem; color: var(--text); margin-bottom: 0.4rem;
    }
    .success-desc { font-size: 0.83rem; color: var(--muted); line-height: 1.6; margin-bottom: 1.25rem; }
    .countdown-bar-wrap { background: var(--surface2); border-radius: 99px; height: 4px; margin-bottom: 0.6rem; overflow: hidden; }
    .countdown-bar { height: 100%; background: var(--accent); border-radius: 99px; width: 100%; transition: width 1s linear; }
    .countdown-text { font-size: 0.78rem; color: var(--muted); margin-bottom: 1.25rem; text-align: center; }
    .btn-back-login {
      width: 100%; background: none; border: 1px solid var(--border);
      border-radius: 10px; padding: 0.7rem;
      font-family: 'DM Sans', sans-serif; font-size: 0.875rem;
      color: var(--muted); cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }
    .btn-back-login:hover { border-color: var(--accent); color: var(--accent); }

    /* Subtitle */
    .subtitle { font-size: 0.82rem; color: var(--muted); margin-bottom: 0; line-height: 1.6; }

    /* Decorative corner accent */
    .card-accent {
      position: absolute; top: 0; right: 0;
      width: 80px; height: 80px; overflow: hidden;
      border-radius: 0 var(--radius) 0 0; pointer-events: none;
    }
    .card-accent::before {
      content: '';
      position: absolute; top: -40px; right: -40px;
      width: 80px; height: 80px; border-radius: 50%;
      background: radial-gradient(circle, rgba(232,104,138,0.15) 0%, transparent 70%);
    }
  </style>
</head>
<body>

<!-- Theme Toggle -->
<button class="theme-toggle" id="theme-toggle" onclick="toggleTheme()">
  <span id="theme-icon">☀️</span>
  <span id="theme-label">Light</span>
</button>

<!-- Auth Card -->
<div class="auth-card" id="auth-card" style="display:none;">
  <div class="card-accent"></div>
  <div class="brand">HorsukTheone</div>
  <div class="brand-sub">& Banglamung</div>

  <div class="tabs">
    <button class="tab-btn active" id="tab-login">เข้าสู่ระบบ</button>
    <button class="tab-btn" id="tab-register">สมัครสมาชิก</button>
  </div>

  <div class="msg" id="msg-box"></div>

  <!-- Login Form -->
  <div id="form-login">
    <div class="form-group">
      <label>อีเมล</label>
      <input type="email" id="login-email" placeholder="youremail@example.com" />
    </div>
    <div class="form-group">
      <label>รหัสผ่าน</label>
      <input type="password" id="login-password" placeholder="••••••••" />
      <a class="forgot-link" id="btn-forgot" href="#">ลืมรหัสผ่าน?</a>
    </div>
    <button class="btn-primary" id="btn-login">เข้าสู่ระบบ</button>
    <div class="subtitle" style="margin-top:1.25rem;">มีปัญหาเรื่องการใช้งาน ติดต่อผู้ดูแลระบบได้เลยครับ</div>
  </div>

  <!-- Register Form -->
  <div id="form-register" style="display:none;">
    <div class="form-group">
      <label>ชื่อที่แสดง</label>
      <input type="text" id="reg-name" placeholder="ชื่อ Username ของคุณ" />
    </div>
    <div class="form-group">
      <label>อีเมล</label>
      <input type="email" id="reg-email" placeholder="youremail@example.com" />
    </div>
    <div class="form-group">
      <label>รหัสผ่าน</label>
      <input type="password" id="reg-password" placeholder="อย่างน้อย 6 ตัวอักษร" />
    </div>
    <div class="form-group">
      <label>ยืนยันรหัสผ่าน</label>
      <input type="password" id="reg-password-confirm" placeholder="พิมพ์รหัสผ่านอีกครั้ง" />
    </div>
    <button class="btn-primary" id="btn-register">สร้างบัญชี</button>
  </div>

  <!-- Forgot Password Form -->
  <div id="form-forgot" style="display:none;">
    <button class="btn-back" id="btn-back-from-forgot">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      กลับหน้าเข้าสู่ระบบ
    </button>
    <div class="forgot-title">กู้คืนรหัสผ่าน</div>
    <div class="forgot-desc">กรอกอีเมลที่ใช้สมัครสมาชิก ระบบจะส่งลิงก์ตั้งรหัสผ่านใหม่ไปให้ทันที</div>
    <div class="msg" id="msg-box-forgot"></div>
    <div class="form-group">
      <label>อีเมล</label>
      <input type="email" id="forgot-email" placeholder="youremail@example.com" />
    </div>
    <button class="btn-primary" id="btn-send-reset">ส่งลิงก์กู้คืนรหัสผ่าน</button>
  </div>

  <!-- Forgot Success -->
  <div id="view-forgot-success" style="display:none;">
    <div class="success-icon">✉️</div>
    <div class="success-title">ส่งอีเมลแล้ว!</div>
    <div class="success-desc" id="success-email-desc">ระบบส่งลิงก์รีเซ็ตรหัสผ่านไปที่อีเมลของคุณแล้ว</div>
    <div class="countdown-bar-wrap">
      <div class="countdown-bar" id="countdown-bar"></div>
    </div>
    <div class="countdown-text" id="countdown-text">กลับหน้าเข้าสู่ระบบอัตโนมัติใน 60 วินาที</div>
    <button class="btn-back-login" id="btn-back-to-login-now">← กลับหน้าเข้าสู่ระบบทันที</button>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import {
    getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword,
    signOut, onAuthStateChanged, updateProfile,
    sendEmailVerification, sendPasswordResetEmail
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

  const firebaseConfig = {
    apiKey:            "AIzaSyBKhes9uVB7tFATNChmYJtkSGXtoV8pGoI",
    authDomain:        "civiltoolskit.firebaseapp.com",
    projectId:         "civiltoolskit",
    storageBucket:     "civiltoolskit.firebasestorage.app",
    messagingSenderId: "108662763128",
    appId:             "1:108662763128:web:9ebf8987c628bcd852878d",
    measurementId:     "G-XN3CGMHJKD"
  };

  const app  = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  const SESSION_KEY   = "htb_login_time";
  const SESSION_LIMIT = 24 * 60 * 60 * 1000;

  // ── Helpers ──
  function showMsg(text, type) {
    const box = document.getElementById("msg-box");
    box.textContent = text; box.className = "msg " + type + " show";
  }
  function setLoading(btnId, loading, defaultText) {
    const btn = document.getElementById(btnId);
    btn.disabled  = loading;
    btn.innerHTML = loading ? '<span class="spinner"></span> กำลังดำเนินการ...' : defaultText;
  }
  function getErrorMsg(code) {
    const map = {
      "auth/email-already-in-use":  "อีเมลนี้ถูกใช้งานแล้ว",
      "auth/invalid-email":         "รูปแบบอีเมลไม่ถูกต้อง",
      "auth/weak-password":         "รหัสผ่านต้องมีอย่างน้อย 6 ตัวอักษร",
      "auth/user-not-found":        "ไม่พบบัญชีนี้ในระบบ",
      "auth/wrong-password":        "รหัสผ่านไม่ถูกต้อง",
      "auth/invalid-credential":    "อีเมลหรือรหัสผ่านไม่ถูกต้อง",
      "auth/too-many-requests":     "ลองมากเกินไป กรุณารอสักครู่",
    };
    return map[code] || "เกิดข้อผิดพลาด: " + code;
  }
  function switchTab(tab) {
    document.getElementById("form-login").style.display    = tab === "login"    ? "block" : "none";
    document.getElementById("form-register").style.display = tab === "register" ? "block" : "none";
    document.getElementById("tab-login").classList.toggle("active",    tab === "login");
    document.getElementById("tab-register").classList.toggle("active", tab === "register");
    document.getElementById("msg-box").className = "msg";
  }

  const VIEWS = ["form-login","form-register","form-forgot","view-forgot-success"];
  function showView(id) {
    VIEWS.forEach(v => document.getElementById(v).style.display = v === id ? "block" : "none");
    const isForgot = id === "form-forgot" || id === "view-forgot-success";
    document.querySelector(".tabs").style.display = isForgot ? "none" : "";
    document.getElementById("msg-box").className = "msg";
  }

  // ── Auth state ──
  onAuthStateChanged(auth, async user => {
    if (user && user.emailVerified) {
      const loginTime = localStorage.getItem(SESSION_KEY);
      const now = Date.now();
      if (!loginTime) {
        localStorage.setItem(SESSION_KEY, now.toString());
        window.location.href = "https://tanapawnj2.github.io/tanapawnj2.githup.io/index.html";
      } else if ((now - parseInt(loginTime)) < SESSION_LIMIT) {
        window.location.href = "https://tanapawnj2.github.io/tanapawnj2.githup.io/index.html";
      } else {
        await signOut(auth);
        localStorage.removeItem(SESSION_KEY);
      }
    } else {
      document.getElementById("auth-card").style.display = "block";
    }
  });

  // ── Tabs ──
  document.getElementById("tab-login").addEventListener("click",    () => switchTab("login"));
  document.getElementById("tab-register").addEventListener("click", () => switchTab("register"));

  // ── Login ──
  document.getElementById("btn-login").addEventListener("click", async () => {
    const email = document.getElementById("login-email").value.trim();
    const pass  = document.getElementById("login-password").value;
    if (!email || !pass) return showMsg("กรุณากรอกอีเมลและรหัสผ่าน", "error");
    setLoading("btn-login", true, "เข้าสู่ระบบ");
    try {
      const result = await signInWithEmailAndPassword(auth, email, pass);
      if (!result.user.emailVerified) {
        await signOut(auth);
        showMsg("กรุณายืนยันอีเมลก่อนเข้าสู่ระบบ", "error");
        return;
      }
      localStorage.setItem(SESSION_KEY, Date.now().toString());
    } catch(e) { showMsg(getErrorMsg(e.code), "error"); }
    finally { setLoading("btn-login", false, "เข้าสู่ระบบ"); }
  });

  // ── Register ──
  document.getElementById("btn-register").addEventListener("click", async () => {
    const name    = document.getElementById("reg-name").value.trim();
    const email   = document.getElementById("reg-email").value.trim();
    const pass    = document.getElementById("reg-password").value;
    const confirm = document.getElementById("reg-password-confirm").value;
    if (!name || !email || !pass || !confirm) return showMsg("กรุณากรอกข้อมูลให้ครบ", "error");
    if (pass.length < 6)  return showMsg("รหัสผ่านต้องมีอย่างน้อย 6 ตัวอักษร", "error");
    if (pass !== confirm) return showMsg("รหัสผ่านทั้งสองช่องไม่ตรงกัน", "error");
    setLoading("btn-register", true, "สร้างบัญชี");
    try {
      const cred = await createUserWithEmailAndPassword(auth, email, pass);
      await updateProfile(cred.user, { displayName: name });
      await sendEmailVerification(cred.user);
      await signOut(auth);
      showMsg("สมัครสมาชิกสำเร็จ! กรุณายืนยันอีเมลก่อนเข้าสู่ระบบครับ", "success");
      switchTab("login");
    } catch(e) { showMsg(getErrorMsg(e.code), "error"); }
    finally { setLoading("btn-register", false, "สร้างบัญชี"); }
  });

  // ── Forgot ──
  document.getElementById("btn-forgot").addEventListener("click", e => { e.preventDefault(); showView("form-forgot"); });
  document.getElementById("btn-back-from-forgot").addEventListener("click", () => showView("form-login"));

  let countdownTimer = null;
  function startCountdown() {
    const TOTAL = 60; let remaining = TOTAL;
    const bar  = document.getElementById("countdown-bar");
    const text = document.getElementById("countdown-text");
    bar.style.width = "100%";
    countdownTimer = setInterval(() => {
      remaining--;
      bar.style.width = (remaining / TOTAL * 100) + "%";
      text.textContent = `กลับหน้าเข้าสู่ระบบอัตโนมัติใน ${remaining} วินาที`;
      if (remaining <= 0) { clearInterval(countdownTimer); goBackToLogin(); }
    }, 1000);
  }
  function goBackToLogin() {
    if (countdownTimer) { clearInterval(countdownTimer); countdownTimer = null; }
    document.getElementById("forgot-email").value = "";
    showView("form-login"); switchTab("login");
  }
  document.getElementById("btn-back-to-login-now").addEventListener("click", goBackToLogin);

  document.getElementById("btn-send-reset").addEventListener("click", async () => {
    const email  = document.getElementById("forgot-email").value.trim();
    const msgBox = document.getElementById("msg-box-forgot");
    if (!email) { msgBox.textContent = "กรุณากรอกอีเมลของคุณ"; msgBox.className = "msg error show"; return; }
    const btn = document.getElementById("btn-send-reset");
    btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> กำลังส่ง...';
    try {
      await sendPasswordResetEmail(auth, email);
      document.getElementById("success-email-desc").innerHTML =
        `ระบบส่งลิงก์รีเซ็ตรหัสผ่านไปที่<br><strong style="color:var(--accent)">${email}</strong>`;
      showView("view-forgot-success"); startCountdown();
    } catch(e) {
      const map = { "auth/invalid-email": "รูปแบบอีเมลไม่ถูกต้อง", "auth/user-not-found": "ไม่พบบัญชีที่ใช้อีเมลนี้" };
      msgBox.textContent = map[e.code] || "เกิดข้อผิดพลาด: " + e.code;
      msgBox.className = "msg error show";
      btn.disabled = false; btn.innerHTML = "ส่งลิงก์กู้คืนรหัสผ่าน";
    }
  });

  document.getElementById("forgot-email").addEventListener("keydown", e => {
    if (e.key === "Enter") document.getElementById("btn-send-reset").click();
  });
  document.getElementById("login-password").addEventListener("keydown", e => {
    if (e.key === "Enter") document.getElementById("btn-login").click();
  });
</script>

<script>
  // Theme toggle
  function toggleTheme() {
    const isLight = document.documentElement.classList.toggle('light');
    document.getElementById('theme-icon').textContent  = isLight ? '🌙' : '☀️';
    document.getElementById('theme-label').textContent = isLight ? 'Dark' : 'Light';
    localStorage.setItem('htb_theme', isLight ? 'light' : 'dark');
  }
  if (localStorage.getItem('htb_theme') === 'light') {
    document.documentElement.classList.add('light');
    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('theme-icon').textContent  = '🌙';
      document.getElementById('theme-label').textContent = 'Dark';
    });
  }
</script>

</body>
</html>
